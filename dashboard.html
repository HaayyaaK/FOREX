            if (!saveProfileBtn) return;
            // Reflect the already-read gate into the button; do not re-capture here.
            setSaveProfile(profileSaveEnabled, false);
            saveProfileBtn.addEventListener('click', function () {
                setSaveProfile(saveProfileBtn.getAttribute('aria-pressed') !== 'true', true);
            });
        }

        // ---- Connection indicator in the header (real observed state only) ----
        // Pulse dot only; the state text is exposed via the chip's title/aria-label.
        var connDot = document.getElementById('connDot');
        var connChip = document.getElementById('connChip');
        function setConn(state, message) {
            if (connDot) {
                connDot.classList.remove('is-loading', 'is-ok', 'is-error');
                if (state === 'loading') connDot.classList.add('is-loading');
                else if (state === 'ok') connDot.classList.add('is-ok');
                else if (state === 'error') connDot.classList.add('is-error');
            }
            if (connChip) {
                var label = state === 'loading' ? 'Connecting…'
                    : state === 'ok' ? 'Connected'
                    : state === 'error' ? 'Unreachable' : 'Idle';
                var full = 'Analysis proxy connection: ' + label + (message ? ' — ' + message : '');
                connChip.title = full;
                connChip.setAttribute('aria-label', full);
            }
        }

        // Proactively reflect the REAL proxy state instead of sitting at "Idle".
        // Probes /api/v1/health on load and on an interval, and skips while an
        // Analyze run owns the indicator (analysisInFlight) so it isn't clobbered.
        var analysisInFlight = false;
        function probeConnection() {
            if (analysisInFlight) return;
            if (!window.QT || !QT.app || typeof QT.app.checkHealth !== 'function') {
                setConn('idle');
                return;
            }
            QT.app.checkHealth().then(function (h) {
                if (analysisInFlight) return;   // an Analyze run started meanwhile
                if (h && h.ok) {
                    setConn('ok', 'Proxy healthy' + (h.status && h.status !== 'ok' ? ' (' + h.status + ')' : '') + '.');
                } else {
                    setConn('error', 'Proxy unreachable — start it / enable the IIS reverse proxy.');
                }
            });
        }

        // ---------------------------------------------------------------
        // Session persistence — reopen exactly as the user left it. Symbol,
        // interval and profile join the already-persisted workspace and
        // Trader/Analyst mode. (Chart style is no longer persisted — the
        // TradingView toolbar owns it.) Presentation state only.
        // ---------------------------------------------------------------
        var PREF = { symbol: 'qt.symbol', interval: 'qt.interval', profile: 'qt.profile' };
        // Persistence is OFF by default: the app always opens in its default
        // configuration. Only when the Save-Profile icon is Active does it both
        // persist changes and restore the last custom settings on next load.
        // `profileSaveEnabled` is the single gate; it is read from storage at the
        // very top of Init (before restorePrefs) and kept in sync by setSaveProfile.
        function savePref(k, v) {
            if (!profileSaveEnabled) return;   // no writes unless Save Profile is Active
            try { localStorage.setItem(k, v); } catch (e) { /* storage may be unavailable */ }
        }
        function loadPref(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
        function setSelectValue(id, val) {
            var sel = document.getElementById(id);
            if (!sel || val == null) return;
            var ok = Array.prototype.some.call(sel.options, function (o) { return o.value === val; });
            if (ok) sel.value = val;
        }
        function restorePrefs() {
            if (!profileSaveEnabled) return;   // defaults unless Save Profile is Active
            var sym = loadPref(PREF.symbol);
            if (sym) {
                for (var i = 0; i < PAIRS.length; i++) {
                    if (PAIRS[i].symbol === sym) { activeIndex = i; break; }
                }
            }
            setSelectValue('intervalSelect', loadPref(PREF.interval));
            setSelectValue('profileSelect', loadPref(PREF.profile));
        }
        // Snapshot the current UI into storage — used the moment the user turns
        // the toggle ON, so "save from now on" captures the present state too.
        function persistCurrentSettings() {
            savePref(PREF.symbol, PAIRS[activeIndex].symbol);
            var iv = document.getElementById('intervalSelect');
            var pf = document.getElementById('profileSelect');
            if (iv) savePref(PREF.interval, iv.value);
            if (pf) savePref(PREF.profile, pf.value);
            if (profileSaveEnabled) {
                try { localStorage.setItem(WS_KEY, appEl.getAttribute('data-workspace') || 'charts'); } catch (e) {}
                try { if (window.QT && QT.card) localStorage.setItem('qt.uiMode', QT.card.getMode()); } catch (e) {}
            }
        }
        function wirePrefPersistence() {
            var iv = document.getElementById('intervalSelect');
            var pf = document.getElementById('profileSelect');
            if (iv) iv.addEventListener('change', function () { savePref(PREF.interval, iv.value); });
            if (pf) pf.addEventListener('change', function () { savePref(PREF.profile, pf.value); });
        }

        // ---------------------------------------------------------------
        // Init
        // ---------------------------------------------------------------
        // Read the persistence gate FIRST, so restorePrefs() and every later
        // read honour it. Default (unset/'0') => open in defaults.
        try { profileSaveEnabled = (localStorage.getItem(SAVE_PROFILE_KEY) === '1'); } catch (e) { profileSaveEnabled = false; }
        restorePrefs();
        buildOptions();
        renderTrigger();
        updateClock();
        (function () { var y = document.getElementById('footYear'); if (y) y.textContent = new Date().getFullYear(); })();
        setInterval(updateClock, 1000);
        mountTickerTape();
        wireWorkspaceSwitch();
        wireSaveProfile();
        wirePrefPersistence();
        setConn('loading', 'Checking analysis proxy…');
        probeConnection();
        // Keep the indicator live — re-check the proxy every 60s.
        setInterval(probeConnection, 60000);

        // ---------------------------------------------------------------
        // Trader / Analyst mode toggle — pure display switch (Phase 8.5).
        // QT.card owns the mode state (and its localStorage persistence);
        // this just reflects it into the radio pair and forwards changes.
        // Switching modes never re-fetches, re-analyzes, or re-renders.
        // ---------------------------------------------------------------
        // Restore the saved Trader/Analyst mode only when Save Profile is Active;
        // otherwise force the default (Trader) so the app opens in defaults.
        var modeRadios = document.querySelectorAll('input[name="uiMode"]');
        var initialMode = profileSaveEnabled ? QT.card.getMode() : QT.card.setMode('trader');
        modeRadios.forEach(function (r) {
            r.checked = (r.value === initialMode);
            r.addEventListener('change', function () {
                if (this.checked) QT.card.setMode(this.value);
            });
        });

        // ---------------------------------------------------------------
        // Analyze: delegates entirely to the engine; no analysis lives here.
        // ---------------------------------------------------------------
        var analyzeBtn = document.getElementById('analyzeBtn');
        var analysisCard = document.getElementById('analysisCard');
        var profileSelect = document.getElementById('profileSelect');

        analyzeBtn.addEventListener('click', function () {
            // Results render in Keen Eye — surface it immediately so the user
            // sees the loading state and then the recommendation as it lands.
            setWorkspace('keeneye');
            analysisInFlight = true;   // the health probe yields to the Analyze run
            setConn('loading', 'Analyzing ' + PAIRS[activeIndex].label + '…');
            QT.app.run({
                symbol: PAIRS[activeIndex].symbol,
                timeframe: document.getElementById('intervalSelect').value,
                profile: profileSelect.value,
                container: analysisCard,
                button: analyzeBtn
            }).then(function (rec) {
                analysisInFlight = false;
                if (rec && rec.recommendation) {
                    setConn('ok', 'Analysis ready — ' + rec.recommendation.label + '.');
                } else {
                    setConn('error', 'Analysis failed. See the panel for details.');
                }
            });
        });

        window.addEventListener('load', () => {
            renderChart();
            // Restore the last workspace only after the chart mounts while Charts
            // is visible, so TradingView sizes correctly on first paint.
            var startWs = 'charts';
            if (profileSaveEnabled) {
                try { startWs = localStorage.getItem(WS_KEY) || 'charts'; } catch (e) { /* storage may be unavailable */ }
            }
            setWorkspace(startWs);
        });
    </script>

</body>
</html>
