<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Live Market Dashboard</title>
    <style>
        /* ==============================================================
           Design tokens
           Every dimension below is either fluid (clamp) or measured at
           runtime, so the layout resolves against the real viewport
           rather than hard-coded breakpoint guesses.
           ============================================================== */
        :root {
            color-scheme: dark;

            /* ---- Palette ---- */
            --c-bg: #0f0f1a;
            --c-surface: #12121f;
            --c-surface-2: #1a1a2e;
            --c-surface-3: #14142a;
            --c-elevated: #23234a;
            --c-border: #2a2a4a;
            --c-border-soft: #1e1e35;
            --c-border-hover: #3a3a5f;
            --c-text: #e0e0e0;
            --c-text-strong: #ffffff;
            --c-text-dim: #888888;
            --c-text-faint: #6a6a8a;
            --c-text-muted: #7b7b96;
            --c-accent: #7b2ff7;
            --c-accent-2: #00d4ff;
            --c-live: #00e676;
            --c-danger: #ff6b6b;
            --grad-brand: linear-gradient(90deg, var(--c-accent-2), var(--c-accent));
            --grad-action: linear-gradient(135deg, var(--c-accent), var(--c-accent-2));

            /* ---- Pixel-aware primitives ----
               --hairline renders a true 1-device-pixel rule (see the HiDPI
               media queries below) instead of a blurry 1px. */
            --hairline: 1px;

            /* ---- Fluid spacing (clamped at both ends) ---- */
            --sp-1: clamp(2px, 0.25vw, 4px);
            --sp-2: clamp(4px, 0.5vw, 8px);
            --sp-3: clamp(7px, 0.85vw, 12px);
            --sp-4: clamp(10px, 1.25vw, 18px);
            --sp-5: clamp(14px, 1.75vw, 26px);

            /* ---- Fluid type ---- */
            --fs-2xs: clamp(0.58rem, 0.52rem + 0.18vw, 0.7rem);
            --fs-xs:  clamp(0.68rem, 0.62rem + 0.2vw, 0.8rem);
            --fs-sm:  clamp(0.76rem, 0.7rem + 0.22vw, 0.9rem);
            --fs-md:  clamp(0.84rem, 0.78rem + 0.25vw, 1rem);
            --fs-lg:  clamp(1.05rem, 0.88rem + 0.78vw, 1.5rem);

            /* ---- Radii ---- */
            --r-sm: 4px;
            --r-md: 6px;
            --r-lg: 8px;

            /* ---- Component sizing ---- */
            --logo-size: clamp(16px, 0.9rem + 0.4vw, 22px);
            --logo-overlap: calc(var(--logo-size) * -0.4);
            --control-h: clamp(30px, 1.7rem + 0.8vw, 40px);
            --symbol-w: clamp(150px, 16vw, 230px);

            /* One arrow spec shared by every selector field */
            --arrow-size: clamp(0.5rem, 0.44rem + 0.18vw, 0.62rem);
            --arrow-gap: var(--sp-3);
            --c-arrow: #8b8bab;
            --panel-max-h: clamp(200px, 42dvh, 420px);
            --dot-size: clamp(6px, 0.5vw, 9px);
        }

        /* True hairline borders on HiDPI displays */
        @media (min-resolution: 1.5dppx) { :root { --hairline: 0.5px; } }
        @media (min-resolution: 2.5dppx) { :root { --hairline: 0.34px; } }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { height: 100%; }
        body {
            background: var(--c-bg);
            color: var(--c-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: var(--fs-md);
            height: 100%;
            /* The app shell (below) owns 100dvh and manages every scroll
               internally, so the browser viewport itself never scrolls. */
            overflow: hidden;
        }

        /* ---------------- Header ---------------- */
        .header {
            background: linear-gradient(135deg, var(--c-surface-2) 0%, #16213e 100%);
            padding: var(--sp-3) var(--sp-5);
            display: flex;
            align-items: center;
            gap: var(--sp-3);
            flex-wrap: wrap;
            border-bottom: var(--hairline) solid var(--c-border);
        }

        .header h1 {
            font-size: var(--fs-lg);
            font-weight: 600;
            line-height: 1.2;
            background: var(--grad-brand);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Status = live dot + time only. Tight gap so the pair reads as one unit. */
        .header .status {
            display: flex;
            align-items: center;
            gap: var(--sp-2);
            font-size: var(--fs-sm);
            color: var(--c-text-dim);
            font-variant-numeric: tabular-nums;
            line-height: 1;
            white-space: nowrap;
        }

        .header .status .dot {
            width: var(--dot-size);
            height: var(--dot-size);
            background: var(--c-live);
            border-radius: 50%;
            flex: 0 0 auto;
            animation: pulse 2s infinite;
        }

        .header .status #clock {
            color: var(--c-text-strong);
            font-weight: 600;
            letter-spacing: 0.3px;
            line-height: 1;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ---------------- Ticker bar (hosts TradingView ticker-tape) --------- */
        .ticker-bar {
            background: var(--c-surface);
            border-bottom: var(--hairline) solid var(--c-border);
            overflow: hidden;
            min-height: 46px;
        }

        .ticker-bar .tradingview-widget-container,
        .ticker-bar .tradingview-widget-container__widget {
            width: 100%;
        }

        .ticker-bar .tradingview-widget-copyright { display: none; }

        /* ---------------- Controls ---------------- */
        .controls {
            padding: var(--sp-3) var(--sp-5);
            display: flex;
            align-items: center;
            gap: var(--sp-3);
            flex-wrap: wrap;
            background: var(--c-surface);
            border-bottom: var(--hairline) solid var(--c-border-soft);
        }

        /* Mode toggle + Analyze: one fixed group at the end of the controls bar. */
        .controls-end {
            display: flex; align-items: center; gap: var(--sp-3);
            flex: 0 0 auto; margin-left: auto;
        }

        .controls label {
            font-size: var(--fs-xs);
            color: var(--c-text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* ---- Unified dropdown arrow ----
           Native select arrows are drawn by the OS and differ per platform, so
           they're suppressed and every field - native selects and the custom
           symbol trigger alike - renders the same U+25BC glyph at the same
           size, colour and optical position. */
        .select-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .select-wrap::after,
        .symbol-trigger .caret {
            font-size: var(--arrow-size);
            line-height: 1;
            color: var(--c-arrow);
            pointer-events: none;
        }

        .select-wrap::after {
            content: '\25BC';
            position: absolute;
            right: var(--arrow-gap);
            top: 50%;
            transform: translateY(-50%);
        }

        .controls select {
            height: var(--control-h);
            background: var(--c-surface-2);
            color: var(--c-text);
            border: var(--hairline) solid var(--c-border);
            /* room on the right for the shared arrow */
            padding: 0 calc(var(--arrow-gap) * 2 + var(--arrow-size)) 0 var(--sp-3);
            border-radius: var(--r-md);
            font-size: var(--fs-sm);
            font-family: inherit;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        .controls select::-ms-expand { display: none; }

        .controls select:focus-visible {
            outline: none;
            border-color: var(--c-accent);
        }

        /* Scoped to the action button so it can't bleed onto the symbol trigger. */
        .controls #reloadBtn {
            height: var(--control-h);
            background: var(--grad-action);
            color: var(--c-text-strong);
            border: none;
            padding: 0 var(--sp-4);
            border-radius: var(--r-md);
            font-size: var(--fs-sm);
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .controls #reloadBtn:hover { opacity: 0.85; }

        /* ---------------- Symbol logos ---------------- */
        .sym-logo {
            display: inline-flex;
            align-items: center;
            flex: 0 0 auto;
        }

        .sym-logo img,
        .sym-logo .sym-fallback {
            width: var(--logo-size);
            height: var(--logo-size);
            border-radius: 50%;
            background: var(--c-border);
            object-fit: cover;
            display: block;
        }

        .sym-logo .sym-fallback {
            font-size: var(--fs-2xs);
            font-weight: 700;
            color: #cfd3e6;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -0.3px;
        }

        .sym-logo > *:nth-child(2) {
            margin-left: var(--logo-overlap);
            box-shadow: -2px 0 0 0 var(--c-surface-2);
        }

        /* ---------------- Custom symbol selector ---------------- */
        .symbol-select {
            position: relative;
            /* Fit content: the trigger already pads itself; no forced minimum. */
            flex: 0 0 auto;
        }

        .controls .symbol-trigger {
            width: 100%;
            height: var(--control-h);
            display: flex;
            align-items: center;
            gap: var(--sp-2);
            background: var(--c-surface-2);
            color: var(--c-text);
            border: var(--hairline) solid var(--c-border);
            padding: 0 var(--sp-3);
            border-radius: var(--r-md);
            font-size: var(--fs-sm);
            font-family: inherit;
            line-height: 1.2;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.2s;
        }

        .symbol-trigger:hover { border-color: var(--c-border-hover); }

        .symbol-trigger:focus-visible,
        .symbol-select.open .symbol-trigger {
            outline: none;
            border-color: var(--c-accent);
        }

        .symbol-trigger .sym-ticker {
            flex: 1 1 auto;
            min-width: 0;
            font-weight: 600;
            color: var(--c-text-strong);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* size/colour come from the shared arrow rule above */
        .symbol-trigger .caret {
            flex: 0 0 auto;
            display: block;
            /* matches the native selects' arrow inset */
            margin-right: calc(var(--arrow-gap) - var(--sp-3));
            transition: transform 0.2s;
        }

        /* Only the custom dropdown can know it is expanded, so only it flips. */
        .symbol-select.open .caret { transform: rotate(180deg); }

        /* Panel tracks the trigger width but may grow to fit its rows, so the
           option layout never gets crushed when the trigger is narrow. Capped so
           it can't outgrow the viewport. */
        .symbol-panel {
            position: absolute;
            top: calc(100% + var(--sp-2));
            left: 0;
            right: auto;
            min-width: 100%;
            width: max-content;
            max-width: min(340px, calc(100vw - var(--sp-5) * 2));
            background: var(--c-surface-3);
            border: var(--hairline) solid var(--c-border);
            border-radius: var(--r-lg);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.55);
            z-index: 1200;
            padding: var(--sp-2);
            max-height: var(--panel-max-h);
            overflow-y: auto;
            overscroll-behavior: contain;
            display: none;
        }

        .symbol-select.open .symbol-panel { display: block; }

        /* Simplified: logo | pair label. Two roles, nothing else to scan. */
        .symbol-option {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            align-items: center;
            column-gap: var(--sp-3);
            padding: var(--sp-2) var(--sp-3);
            border-radius: var(--r-md);
            cursor: pointer;
            font-size: var(--fs-sm);
        }

        .symbol-option:hover,
        .symbol-option.active { background: var(--c-elevated); }

        .symbol-option[aria-selected="true"] {
            background: linear-gradient(90deg, rgba(123, 47, 247, 0.28), rgba(0, 212, 255, 0.12));
        }

        .symbol-option .opt-ticker {
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
            color: var(--c-text-strong);
        }

        /* ---------------- Active chart ---------------- */
        .chart-panel {
            background: var(--c-surface-2);
            border-radius: var(--r-sm);
            overflow: hidden;
            position: relative;
            /* Dominant component: fills all remaining height in the Charts column. */
            flex: 1 1 auto;
            min-height: 0;
        }

        .chart-panel .chart-host {
            width: 100%;
            height: 100%;
        }

        .chart-message {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: var(--fs-sm);
            color: var(--c-text-faint);
            text-align: center;
            padding: var(--sp-5);
        }

        .chart-message.error { color: var(--c-danger); }

        /* ---------------- Footer ---------------- */
        .footer {
            text-align: center;
            padding: var(--sp-4) var(--sp-3);
            padding-bottom: calc(var(--sp-4) + env(safe-area-inset-bottom, 0px));
            font-size: var(--fs-2xs);
            color: #555;
            border-top: var(--hairline) solid var(--c-border-soft);
        }

        /* ==============================================================
           APP SHELL — two-workspace terminal (Charts / Keen Eye).
           Presentation only. The whole app is pinned to the viewport;
           scrolling happens inside regions, never on <body>. Workspace
           switching is a pure CSS visibility flip on data-workspace — no
           reload, no re-analysis; both panels stay mounted so the chart
           widget and the analysis DOM are never rebuilt on switch.
           ============================================================== */
        .app {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .app-header {
            flex: 0 0 auto;
            position: relative;
            z-index: 10;               /* keep the symbol dropdown above the workspaces */
        }
        .app-body {
            flex: 1 1 auto;
            min-height: 0;             /* lets the inner regions own the scroll */
            position: relative;
        }

        /* Header row: brand | status | header-actions (workspace toggle, Calculator, Save Profile). */
        .header h1 { flex: 0 0 auto; }
        .header .status { margin-left: auto; }

        /* Connection indicator reuses the status dot, recoloured by real state. */
        #connDot { background: var(--qtw-neutral); animation: none; }
        #connDot.is-loading { background: var(--qtw-warn); animation: pulse 2s infinite; }
        #connDot.is-ok { background: var(--c-live); animation: pulse 2s infinite; }
        #connDot.is-error { background: var(--qtw-bear); animation: none; }

        /* Compact connection chip in the header: pulse dot only (real observed
           proxy state is exposed via the title/aria-label, not visible text). */
        .conn-chip {
            display: inline-flex; align-items: center; justify-content: center;
            width: calc(var(--dot-size) + 14px); height: calc(var(--dot-size) + 14px);
            background: var(--c-surface); border: var(--hairline) solid var(--c-border);
            border-radius: 999px; flex: 0 0 auto;
        }

        /* ---- Header actions: workspace toggle, Calculator, Save Profile ----
           Grouped together, fixed at the end of the header row. */
        .header-actions {
            display: inline-flex; align-items: center; gap: var(--sp-2); flex: 0 0 auto;
        }
        .icon-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: var(--control-h); height: var(--control-h); padding: 0;
            background: var(--c-surface-2); border: var(--hairline) solid var(--c-border);
            border-radius: var(--r-md); cursor: pointer; flex: 0 0 auto;
            font-size: clamp(1rem, 0.9rem + 0.3vw, 1.2rem); line-height: 1;
            color: var(--c-text); text-decoration: none; transition: background 0.2s, opacity 0.2s;
        }
        .icon-btn:hover { background: var(--c-elevated); }
        .icon-btn:focus-visible { outline: 2px solid var(--c-accent-2); outline-offset: 2px; }
        .icon-btn[aria-pressed="true"] { border-color: var(--c-accent); }
        /* Save-profile toggle: dim when off, full brightness when on. */
        #saveProfileBtn { opacity: 0.5; }
        #saveProfileBtn[aria-pressed="true"] { opacity: 1; }

        /* ---- Workspaces: stacked in the same area, only the active shown ---- */
        .workspace { position: absolute; inset: 0; display: none; overflow: hidden; }
        .app[data-workspace="charts"]  #wsPanelCharts  { display: flex; flex-direction: column; }
        .app[data-workspace="keeneye"] #wsPanelKeenEye { display: flex; flex-direction: column; }

        /* ---- Charts workspace: the chart is the dominant component ---- */
        #wsPanelCharts { gap: var(--sp-2); padding: var(--sp-2); }
        #wsPanelCharts .ticker-bar { flex: 0 0 auto; border-radius: var(--r-sm); }

        /* ---- Keen Eye workspace: the analysis scrolls inside its own region ---- */
        .analysis-scroll {
            flex: 1 1 auto; min-height: 0;
            overflow-y: auto; overflow-x: hidden; overscroll-behavior: contain;
        }


        /* ==============================================================
           THE WORKSTATION — quantitative analysis presentation layer.
           Pure presentation: every value rendered here is read verbatim
           from the recommendation object produced by engine/qt-*.js.
           No calculation happens in this stylesheet or in qt-card.js.
           ============================================================== */
        :root {
            --qtw-bull: #2fd480;      --qtw-bull-soft: rgba(47, 212, 128, 0.14);
            --qtw-bear: #ff5d6c;      --qtw-bear-soft: rgba(255, 93, 108, 0.14);
            --qtw-warn: #ffb020;      --qtw-warn-soft: rgba(255, 176, 32, 0.14);
            --qtw-info: #3aa8ff;      --qtw-info-soft: rgba(58, 168, 255, 0.14);
            --qtw-ai: #b07bff;        --qtw-ai-soft: rgba(176, 123, 255, 0.14);
            --qtw-neutral: #9aa0b4;   --qtw-neutral-soft: rgba(154, 160, 180, 0.14);
            --qtw-track: rgba(255, 255, 255, 0.08);
            --qtw-card-radius: 14px;
            --qtw-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            /* Lightened, workstation-local variants of --c-text-faint/--c-text-muted:
               the originals measure 3.28-3.66:1 and 4.16-4.40:1 against the card
               surfaces used here (WCAG AA needs 4.5:1 for normal-size text). Scoped
               to .qtw-* only so the pre-existing dashboard chrome is untouched. */
            --qtw-text-faint: #8a8ab2;   /* >=5.17:1 on every card surface */
            --qtw-text-muted: #8a8aa4;   /* >=4.82:1 on every card surface */
        }

        .analysis-area { padding: var(--sp-4); max-width: 1700px; margin: 0 auto; }
        .qt-card-host:empty { display: none; }
        .qtw { display: flex; flex-direction: column; gap: var(--sp-4); }

        /* ---- Dual interface modes (Phase 8.5) ----
           Pure visibility switch: the DOM is built once by qt-card.js; only
           display is toggled here. Analyst-only sections/gauges are tagged
           with .qtw-analyst-only and hidden while data-mode="trader". */
        .qtw[data-mode="trader"] .qtw-analyst-only { display: none; }
        .qtw[data-mode="analyst"] .qtw-trader-only { display: none; }

        /* Segmented control sized and coloured to sit alongside the Analyze
           button (same control height, radius and green primary gradient). */
        .qtw-mode-toggle {
            display: inline-flex; align-items: stretch; gap: 2px; flex: 0 0 auto;
            height: var(--control-h);
            background: var(--c-surface-2); border: var(--hairline) solid var(--c-border);
            border-radius: var(--r-md); padding: 2px;
        }
        .qtw-mode-toggle input[type="radio"] {
            position: absolute; opacity: 0; width: 1px; height: 1px; overflow: hidden;
        }
        .qtw-mode-toggle label {
            display: inline-flex; align-items: center;
            font-size: var(--fs-xs); color: var(--c-text-dim); padding: 0 var(--sp-3);
            border-radius: calc(var(--r-md) - 1px); cursor: pointer; user-select: none; white-space: nowrap;
            transition: background 0.2s, color 0.2s;
        }
        .qtw-mode-toggle label:hover { color: var(--c-text); }
        .qtw-mode-toggle input[type="radio"]:checked + label {
            background: linear-gradient(135deg, #00b894, #00d4ff); color: #04121a; font-weight: 700;
        }
        .qtw-mode-toggle input[type="radio"]:focus-visible + label {
            outline: 2px solid var(--c-accent-2); outline-offset: 1px;
        }

        /* ---- Tone utilities: colour only, never structure ---- */
        .qtw-tone-bull    { color: var(--qtw-bull); }
        .qtw-tone-bear    { color: var(--qtw-bear); }
        .qtw-tone-warn    { color: var(--qtw-warn); }
        .qtw-tone-info    { color: var(--qtw-info); }
        .qtw-tone-ai      { color: var(--qtw-ai); }
        .qtw-tone-neutral { color: var(--qtw-neutral); }

        /* =====================================================
           HERO
           ===================================================== */
        .qtw-hero {
            display: grid;
            grid-template-columns: 1.1fr auto 1.4fr;
            align-items: center;
            gap: var(--sp-5);
            padding: var(--sp-5);
            border-radius: var(--qtw-card-radius);
            background: linear-gradient(135deg, var(--c-surface-2), var(--c-surface-3));
            border: var(--hairline) solid var(--c-border);
            box-shadow: var(--qtw-shadow);
            position: relative;
            overflow: hidden;
        }
        .qtw-hero::before {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(600px 200px at 0% 0%, var(--qtw-glow, transparent), transparent 70%);
            opacity: 0.5;
        }
        .qtw-hero.qtw-tone-bull    { --qtw-glow: var(--qtw-bull-soft); border-left: 3px solid var(--qtw-bull); }
        .qtw-hero.qtw-tone-bear    { --qtw-glow: var(--qtw-bear-soft); border-left: 3px solid var(--qtw-bear); }
        .qtw-hero.qtw-tone-neutral { --qtw-glow: var(--qtw-neutral-soft); border-left: 3px solid var(--qtw-neutral); }
        .qtw-hero.qtw-tone-info    { --qtw-glow: var(--qtw-ai-soft); border-left: 3px solid var(--qtw-ai); }
        .qtw-hero.qtw-int-weak   { opacity: 0.92; }
        .qtw-hero.qtw-int-strong .qtw-hero-icon { filter: drop-shadow(0 0 10px currentColor); }

        .qtw-hero-signal { display: flex; align-items: center; gap: var(--sp-4); z-index: 1; min-width: 0; }
        .qtw-hero-icon {
            font-size: clamp(1.8rem, 1.4rem + 1vw, 2.6rem); line-height: 1; flex: 0 0 auto;
            color: inherit;
        }
        .qtw-hero.qtw-tone-bull .qtw-hero-icon,
        .qtw-hero.qtw-tone-bull .qtw-hero-label { color: var(--qtw-bull); }
        .qtw-hero.qtw-tone-bear .qtw-hero-icon,
        .qtw-hero.qtw-tone-bear .qtw-hero-label { color: var(--qtw-bear); }
        .qtw-hero.qtw-tone-neutral .qtw-hero-icon,
        .qtw-hero.qtw-tone-neutral .qtw-hero-label { color: var(--qtw-neutral); }
        .qtw-hero.qtw-tone-info .qtw-hero-icon,
        .qtw-hero.qtw-tone-info .qtw-hero-label { color: var(--qtw-ai); }
        .qtw-hero-labelwrap { min-width: 0; }
        .qtw-hero-label {
            margin: 0; font-size: clamp(1.3rem, 1rem + 1.4vw, 2.1rem); font-weight: 800; letter-spacing: -0.02em;
            line-height: 1.05; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .qtw-hero-sub { display: flex; gap: var(--sp-2); margin-top: var(--sp-2); flex-wrap: wrap; }
        .qtw-hero-trend { margin-top: var(--sp-2); font-size: var(--fs-sm); font-weight: 600; }

        /* Executive trade ladder inside the hero (spans the full width). */
        .qtw-hero-strip {
            grid-column: 1 / -1; z-index: 1;
            display: flex; flex-wrap: wrap; gap: var(--sp-2);
            margin-top: var(--sp-3); padding-top: var(--sp-4);
            border-top: var(--hairline) solid var(--c-border);
        }
        .qtw-hs-cell {
            flex: 1 1 auto; min-width: 92px; display: flex; flex-direction: column; gap: 2px;
            background: rgba(255, 255, 255, 0.03); border: var(--hairline) solid var(--c-border);
            border-radius: var(--r-md); padding: var(--sp-2) var(--sp-3);
        }
        .qtw-hs-cell.qtw-tone-bull { border-color: rgba(47, 212, 128, 0.35); }
        .qtw-hs-cell.qtw-tone-bear { border-color: rgba(255, 93, 108, 0.35); }
        .qtw-hs-cell.qtw-tone-ai   { border-color: rgba(176, 123, 255, 0.35); }
        .qtw-hs-label { font-size: var(--fs-2xs); color: var(--qtw-text-faint); text-transform: uppercase; letter-spacing: 0.5px; }
        .qtw-hs-value { font-size: var(--fs-md); font-weight: 700; color: var(--c-text-strong); font-variant-numeric: tabular-nums; }
        .qtw-hs-note { color: var(--qtw-text-muted); font-size: var(--fs-sm); padding: var(--sp-2); }

        .qtw-hero-ring { display: flex; flex-direction: column; align-items: center; gap: var(--sp-2); z-index: 1; }

        .qtw-hero-facts {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--sp-3) var(--sp-4); z-index: 1;
        }
        .qtw-fact { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        .qtw-fact-label { font-size: var(--fs-2xs); color: var(--c-text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        .qtw-fact-value { font-size: var(--fs-sm); font-weight: 700; color: var(--c-text-strong); font-variant-numeric: tabular-nums;
                          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* =====================================================
           RINGS & GAUGES  (inline SVG, no chart library)
           ===================================================== */
        .qtw-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
        .qtw-ring-svg { display: block; }
        .qtw-ring-fill { transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .qtw-ring-dim .qtw-ring-fill { opacity: 0.25; }
        .qtw-ring-center {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; pointer-events: none;
        }
        .qtw-ring-value { font-size: 1.4rem; font-weight: 800; color: var(--c-text-strong); font-variant-numeric: tabular-nums; }
        .qtw-ring-sub { font-size: var(--fs-2xs); color: var(--c-text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

        .qtw-gauges {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(96px, 1fr)); gap: var(--sp-3);
            text-align: center;
        }
        .qtw-gauge { display: flex; flex-direction: column; align-items: center; gap: var(--sp-1); }
        .qtw-gauge .qtw-ring-value { font-size: 1rem; }
        .qtw-gauge-label { font-size: var(--fs-2xs); color: var(--c-text-dim); text-transform: uppercase; letter-spacing: 0.4px; }
        .qtw-gauge-sub { font-size: 0.6rem; color: var(--qtw-text-faint); }
        .qtw-gauge-na .qtw-ring-value { color: var(--qtw-text-faint); }

        /* =====================================================
           EXECUTIVE SUMMARY
           ===================================================== */
        .qtw-summary .qtw-card-body { display: flex; flex-direction: column; gap: var(--sp-3); }
        .qtw-exec { font-size: var(--fs-md); line-height: 1.6; color: var(--c-text); }
        .qtw-exec-row { display: flex; align-items: baseline; gap: var(--sp-3); flex-wrap: wrap; }
        .qtw-exec-note { font-size: var(--fs-xs); color: var(--qtw-text-muted); }

        /* =====================================================
           CARD / SECTION shell  (native <details>/<summary>)
           ===================================================== */
        /* dense: when a mode hides some cards, later non-wide cards (e.g. MTF)
           backfill the gap a hidden/wide neighbour would otherwise leave next
           to a half-width card (e.g. Market Health) instead of stranding it
           alone in its row. */
        .qtw-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-auto-flow: dense; gap: var(--sp-4); align-items: start; }
        .qtw-card.qtw-wide { grid-column: 1 / -1; }

        .qtw-card, .qtw-summary {
            background: var(--c-surface-2); border: var(--hairline) solid var(--c-border);
            border-radius: var(--qtw-card-radius); overflow: hidden;
        }
        .qtw-card-head {
            display: flex; align-items: center; gap: var(--sp-3);
            padding: var(--sp-3) var(--sp-4); cursor: pointer; list-style: none;
            user-select: none;
        }
        .qtw-card-head::-webkit-details-marker { display: none; }
        .qtw-card-head:hover { background: rgba(255, 255, 255, 0.03); }
        .qtw-card-badge {
            font-size: 0.6rem; color: var(--qtw-text-faint); border: var(--hairline) solid var(--c-border);
            border-radius: var(--r-sm); padding: 1px 5px; flex: 0 0 auto;
        }
        .qtw-card-title { margin: 0; flex: 1; font-weight: 700; font-size: var(--fs-sm); color: var(--c-text-strong); }
        .qtw-card-meta {
            font-size: var(--fs-2xs); color: var(--qtw-text-faint); text-transform: uppercase;
            letter-spacing: 0.5px; white-space: nowrap;
        }
        .qtw-card-caret { color: var(--c-text-dim); font-size: 0.65rem; transition: transform 0.2s; flex: 0 0 auto; }
        .qtw-card[open] > .qtw-card-head .qtw-card-caret { transform: rotate(180deg); }
        .qtw-card-body { padding: 0 var(--sp-4) var(--sp-4); display: flex; flex-direction: column; gap: var(--sp-3); }

        .qtw-lvl4 .qtw-card-head, .qtw-lvl5 .qtw-card-head { background: rgba(255, 255, 255, 0.015); }
        .qtw-lvl5 { border-style: dashed; }

        .qtw-subhead {
            font-size: var(--fs-2xs); text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--c-text-dim); margin-top: var(--sp-2);
        }
        .qtw-note { color: var(--qtw-text-faint); font-size: var(--fs-2xs); line-height: 1.5; }
        .qtw-plainlist { list-style: none; display: grid; gap: 4px; }
        .qtw-plainlist li {
            font-size: var(--fs-2xs); color: var(--qtw-text-muted); line-height: 1.5;
            padding-left: 10px; position: relative;
        }
        .qtw-plainlist li::before { content: '—'; position: absolute; left: 0; color: var(--qtw-text-faint); }

        /* =====================================================
           CHIPS
           ===================================================== */
        .qtw-chip {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: var(--fs-2xs); padding: 3px 9px; border-radius: 999px;
            background: var(--qtw-neutral-soft); color: var(--c-text);
            white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis;
        }
        .qtw-chip-badge {
            font-size: 0.55rem; font-weight: 800; letter-spacing: 0.3px;
            background: rgba(255, 255, 255, 0.12); border-radius: 4px; padding: 1px 4px; flex: 0 0 auto;
        }
        .qtw-chip.qtw-tone-bull { background: var(--qtw-bull-soft); color: var(--qtw-bull); }
        .qtw-chip.qtw-tone-bear { background: var(--qtw-bear-soft); color: var(--qtw-bear); }
        .qtw-chip.qtw-tone-warn { background: var(--qtw-warn-soft); color: var(--qtw-warn); }
        .qtw-chip.qtw-tone-info { background: var(--qtw-info-soft); color: var(--qtw-info); }
        .qtw-chip.qtw-tone-ai   { background: var(--qtw-ai-soft); color: var(--qtw-ai); }
        .qtw-chip-o {
            background: transparent; border: var(--hairline) solid currentColor; opacity: 0.9;
        }
        .qtw-chipwrap { display: flex; flex-wrap: wrap; gap: var(--sp-2); }

        /* =====================================================
           STATUS ICONS  (qualification gates)
           ===================================================== */
        .qtw-status {
            display: inline-flex; align-items: center; justify-content: center;
            width: 18px; height: 18px; border-radius: 50%; font-size: 0.65rem; font-weight: 800;
            flex: 0 0 auto;
        }
        .qtw-status-pass { background: var(--qtw-bull-soft); color: var(--qtw-bull); }
        .qtw-status-fail { background: var(--qtw-bear-soft); color: var(--qtw-bear); }
        .qtw-status-info { background: var(--qtw-info-soft); color: var(--qtw-info); }

        /* =====================================================
           TRADE TICKET
           ===================================================== */
        .qtw-ticket { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: var(--sp-3); }
        .qtw-ticket-cell {
            background: var(--c-surface); border: var(--hairline) solid var(--c-border);
            border-radius: var(--r-md); padding: var(--sp-3);
            display: flex; flex-direction: column; gap: 2px;
        }
        .qtw-ticket-cell.qtw-tone-bull { border-color: rgba(47, 212, 128, 0.35); }
        .qtw-ticket-cell.qtw-tone-bear { border-color: rgba(255, 93, 108, 0.35); }
        .qtw-ticket-label { font-size: var(--fs-2xs); color: var(--c-text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        .qtw-ticket-value { font-size: var(--fs-md); font-weight: 700; color: var(--c-text-strong); font-variant-numeric: tabular-nums; }
        .qtw-ticket-sub { font-size: var(--fs-2xs); color: var(--qtw-text-faint); }

        .qtw-metricrow {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: var(--sp-3); padding: var(--sp-3) 0; border-top: var(--hairline) solid var(--c-border-soft);
            border-bottom: var(--hairline) solid var(--c-border-soft);
        }
        .qtw-metric { display: flex; flex-direction: column; gap: 2px; text-align: center; }
        .qtw-metric-value { font-size: var(--fs-sm); font-weight: 700; font-variant-numeric: tabular-nums; }
        .qtw-metric-label { font-size: var(--fs-2xs); color: var(--c-text-dim); }

        .qtw-levels { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--sp-4); }
        .qtw-level-col { display: flex; flex-direction: column; gap: var(--sp-2); }
        .qtw-level-col h4 { font-size: var(--fs-2xs); color: var(--c-text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

        .qtw-no-trade {
            background: var(--c-surface); border: var(--hairline) dashed var(--c-border);
            border-radius: var(--r-lg); padding: var(--sp-5); text-align: center;
        }
        .qtw-no-trade-icon { font-size: 2rem; color: var(--qtw-text-faint); }
        .qtw-no-trade strong { display: block; margin: var(--sp-2) 0; color: var(--c-text-strong); font-size: var(--fs-md); }
        .qtw-no-trade p { font-size: var(--fs-xs); color: var(--qtw-text-muted); line-height: 1.5; }
        .qtw-no-trade .qtw-plainlist { text-align: left; max-width: 480px; margin: var(--sp-3) auto 0; }

        /* =====================================================
           MARKET STRUCTURE TIMELINE
           ===================================================== */
        .qtw-timeline {
            display: flex; align-items: center; gap: var(--sp-2); overflow-x: auto;
            padding: var(--sp-2) 0; -webkit-overflow-scrolling: touch;
        }
        .qtw-tl-node {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: var(--sp-2) var(--sp-3); border-radius: var(--r-md); flex: 0 0 auto;
            background: var(--c-surface); border: var(--hairline) solid var(--c-border);
        }
        .qtw-tl-node.qtw-tone-bull { border-color: rgba(47, 212, 128, 0.35); }
        .qtw-tl-node.qtw-tone-bear { border-color: rgba(255, 93, 108, 0.35); }
        .qtw-tl-badge { font-weight: 800; font-size: var(--fs-xs); }
        .qtw-tl-price { font-size: 0.62rem; color: var(--qtw-text-faint); font-variant-numeric: tabular-nums; }
        .qtw-eventcloud { display: flex; flex-wrap: wrap; gap: var(--sp-2); }

        /* =====================================================
           BARS  (score & confidence breakdown)
           ===================================================== */
        .qtw-barlist { display: flex; flex-direction: column; gap: var(--sp-2); }
        .qtw-barrow { display: grid; grid-template-columns: 130px 1fr 64px; align-items: center; gap: var(--sp-3); }
        .qtw-barrow-label { font-size: var(--fs-2xs); color: var(--c-text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .qtw-barrow-value { font-size: var(--fs-2xs); text-align: right; font-variant-numeric: tabular-nums; color: var(--qtw-text-muted); }

        .qtw-sbar { position: relative; }
        .qtw-sbar-track { position: relative; height: 8px; background: var(--c-surface); border-radius: 4px; overflow: hidden; }
        .qtw-sbar-mid { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--c-border-hover); }
        .qtw-sbar-fill { position: absolute; top: 0; bottom: 0; border-radius: 3px; transition: width 0.4s ease; }
        .qtw-sbar-fill.qtw-tone-bull { background: var(--qtw-bull); }
        .qtw-sbar-fill.qtw-tone-bear { background: var(--qtw-bear); }

        .qtw-ubar-track { height: 8px; background: var(--c-surface); border-radius: 4px; overflow: hidden; }
        .qtw-ubar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
        .qtw-ubar-fill.qtw-tone-ai   { background: var(--qtw-ai); }
        .qtw-ubar-fill.qtw-tone-info { background: var(--qtw-info); }
        .qtw-ubar-fill.qtw-tone-warn { background: var(--qtw-warn); }

        .qtw-excluded { display: flex; flex-wrap: wrap; align-items: center; gap: var(--sp-2); }
        .qtw-deltarow {
            display: flex; align-items: center; gap: var(--sp-3); font-size: var(--fs-2xs);
            color: var(--qtw-text-muted); padding-top: var(--sp-2); border-top: var(--hairline) solid var(--c-border-soft);
        }

        /* =====================================================
           EVIDENCE PANELS
           ===================================================== */
        .qtw-evidence-cols { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: var(--sp-4); }
        .qtw-evidence-col h4 { font-size: var(--fs-2xs); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: var(--sp-2); }

        /* =====================================================
           QUALIFICATION GATES
           ===================================================== */
        .qtw-gaterow {
            display: grid; grid-template-columns: auto 72px 1fr auto; align-items: center;
            gap: var(--sp-2); font-size: var(--fs-2xs); padding: 4px 0;
            border-bottom: var(--hairline) solid var(--c-border-soft);
        }
        .qtw-gaterow:last-child { border-bottom: none; }
        .qtw-gate-tier { color: var(--qtw-text-faint); text-transform: uppercase; font-size: 0.6rem; }
        .qtw-gate-id { color: var(--c-text); }
        .qtw-gate-vt { color: var(--qtw-text-muted); font-variant-numeric: tabular-nums; }
        .qtw-gate-msg { grid-column: 1 / -1; color: var(--qtw-text-faint); padding-left: 26px; }

        /* =====================================================
           MTF PANEL
           ===================================================== */
        .qtw-mtf-facts { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: var(--sp-3); }

        /* =====================================================
           WARNINGS
           ===================================================== */
        .qtw-warncard { border-color: rgba(255, 176, 32, 0.3); }
        .qtw-warngroup { padding: var(--sp-2) 0; }
        .qtw-warngroup-title {
            font-size: var(--fs-2xs); font-weight: 700; color: var(--qtw-warn);
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* =====================================================
           TABLE  (technical details)
           ===================================================== */
        .qtw-table { width: 100%; border-collapse: collapse; font-size: var(--fs-2xs); }
        .qtw-table th {
            text-align: left; color: var(--c-text-dim); font-weight: 600; padding: 4px 6px;
            border-bottom: var(--hairline) solid var(--c-border);
        }
        .qtw-table td { padding: 4px 6px; border-bottom: var(--hairline) solid var(--c-border-soft); color: var(--qtw-text-muted); }
        .qtw-numeric { text-align: right; font-variant-numeric: tabular-nums; }

        .qtw-pre {
            background: var(--c-bg); border: var(--hairline) solid var(--c-border);
            border-radius: var(--r-md); padding: var(--sp-3); font-size: 0.66rem; line-height: 1.5;
            color: var(--qtw-text-muted); overflow-x: auto; white-space: pre; max-height: 380px;
        }
        .qtw-inspect-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--sp-3); }

        /* =====================================================
           FOOTER / STATUS / EMPTY
           ===================================================== */
        .qtw-foot {
            display: flex; justify-content: space-between; gap: var(--sp-3); flex-wrap: wrap;
            font-size: var(--fs-2xs); color: var(--qtw-text-faint); padding: var(--sp-2) var(--sp-2) 0;
        }
        .qtw-status-box {
            background: var(--c-surface-2); border: var(--hairline) solid var(--c-border);
            border-radius: var(--qtw-card-radius); padding: var(--sp-5); text-align: center;
        }
        .qtw-status-error { border-color: rgba(255, 93, 108, 0.4); }
        .qtw-status-box strong { color: var(--c-text-strong); display: block; margin-bottom: var(--sp-2); }
        .qtw-empty {
            color: var(--qtw-text-muted); text-align: center;
            padding: clamp(40px, 12vh, 120px) var(--sp-5);
            display: flex; flex-direction: column; align-items: center; gap: var(--sp-2);
        }
        .qtw-empty-icon { font-size: 2.4rem; opacity: 0.75; line-height: 1; }
        .qtw-empty strong { color: var(--c-text-strong); font-size: var(--fs-lg); font-weight: 700; }
        .qtw-empty p { max-width: 460px; font-size: var(--fs-sm); line-height: 1.6; color: var(--qtw-text-muted); }

        #analyzeBtn {
            height: var(--control-h); background: linear-gradient(135deg, #00b894, #00d4ff);
            color: #04121a; border: none; padding: 0 var(--sp-4); border-radius: var(--r-md);
            font-size: var(--fs-sm); font-family: inherit; font-weight: 700; cursor: pointer;
            transition: opacity 0.2s;
        }
        #analyzeBtn:hover { opacity: 0.88; }
        #analyzeBtn:disabled { opacity: 0.5; cursor: progress; }

        /* Consistent keyboard focus rings on the primary action buttons
           (selects/triggers already show a focus border; these did not). */
        #analyzeBtn:focus-visible,
        .controls #reloadBtn:focus-visible {
            outline: 2px solid var(--c-accent-2); outline-offset: 2px;
        }
        /* =====================================================
           RESPONSIVE — cards stack, nothing overflows
           ===================================================== */
        @media (max-width: 1100px) {
            .qtw-hero { grid-template-columns: 1fr; text-align: center; }
            .qtw-hero-signal { flex-direction: column; }
            .qtw-hero-facts { grid-template-columns: repeat(2, 1fr); width: 100%; }
        }
        @media (max-width: 860px) {
            .qtw-grid { grid-template-columns: 1fr; }
            .qtw-card.qtw-wide { grid-column: auto; }
        }
        @media (max-width: 600px) {
            .qtw-hero-facts { grid-template-columns: 1fr 1fr; }
            .qtw-gauges { grid-template-columns: repeat(3, 1fr); }
            .qtw-barrow { grid-template-columns: 90px 1fr 50px; gap: var(--sp-2); }
            .qtw-gate-msg { padding-left: 0; }
        }

        /* ---------------- Narrow screens ---------------- */
        @media (max-width: 620px) {
            .header { justify-content: center; }
            .header .status { margin-left: 0; }
            .symbol-select { flex: 1 1 100%; min-width: 0; }
            .controls label { font-size: var(--fs-2xs); }
        }
    </style>
</head>
<body>

  <div class="app" id="app" data-workspace="charts">

    <!-- Persistent chrome: brand, status, header actions and controls stay
         visible on both workspaces so Analyze and the switchers never
         scroll off-screen. -->
    <div class="app-header">
        <div class="header">
            <h1>&#x1F4C8; Keen Markets</h1>

            <div class="status">
                <span class="conn-chip" id="connChip" title="Analysis proxy connection: Idle">
                    <span class="dot" id="connDot"></span>
                </span>
                <span id="clock">--:--:-- --</span>
            </div>

            <!-- Header actions: workspace toggle, Calculator, Save Profile — one fixed group at the end. -->
            <div class="header-actions">
                <button type="button" class="icon-btn" id="wsToggle"
                        aria-pressed="false" aria-label="Switch to Keen Eye" title="Switch to Keen Eye">
                    <span id="wsToggleIcon" aria-hidden="true">&#x1F4C8;</span>
                </button>
                <a class="icon-btn" id="calcLink" href="calc.html" target="_blank" rel="noopener"
                   aria-label="Open Calculator" title="Open Calculator">&#x1F9EE;</a>
                <button type="button" class="icon-btn" id="saveProfileBtn"
                        aria-pressed="false" aria-label="Save profile preferences" title="Save profile preferences">
                    &#x1F4BE;
                </button>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls" id="controlsBar">
            <label id="symbolLabel">Symbol:</label>
            <div class="symbol-select" id="symbolSelect">
                <button type="button" class="symbol-trigger" id="symbolTrigger"
                        aria-haspopup="listbox" aria-expanded="false" aria-labelledby="symbolLabel symbolTrigger">
                    <span class="sym-logo" id="triggerLogo"></span>
                    <span class="sym-ticker" id="triggerTicker">&mdash;</span>
                    <span class="caret">&#x25BC;</span>
                </button>
                <div class="symbol-panel" id="symbolPanel">
                    <div id="symbolOptions" role="listbox" aria-labelledby="symbolLabel"></div>
                </div>
            </div>

            <label for="intervalSelect">Interval:</label>
            <div class="select-wrap">
                <select id="intervalSelect">
                    <option value="1">1m</option>
                    <option value="5">5m</option>
                    <option value="15">15m</option>
                    <option value="30">30m</option>
                    <option value="60" selected>1h</option>
                    <option value="240">4h</option>
                    <option value="D">D</option>
                </select>
            </div>

            <label for="styleSelect">Style:</label>
            <div class="select-wrap">
                <select id="styleSelect">
                    <option value="1" selected>Candles</option>
                    <option value="2">Line</option>
                    <option value="3">Area</option>
                    <option value="9">Hollow Candles</option>
                </select>
            </div>

            <button type="button" id="reloadBtn">Reload</button>

            <label for="profileSelect">Profile:</label>
            <div class="select-wrap">
                <select id="profileSelect">
                    <option value="conservative">Conservative</option>
                    <option value="balanced" selected>Balanced</option>
                    <option value="aggressive">Aggressive</option>
                    <option value="research_structure_only">Research A — Structure</option>
                    <option value="research_trend_following">Research B — Trend</option>
                </select>
            </div>

            <!-- Analysis-detail toggle + Analyze: one fixed group at the end. -->
            <div class="controls-end">
                <div class="qtw-mode-toggle" role="radiogroup" aria-label="Analysis detail mode">
                    <input type="radio" id="modeTrader" name="uiMode" value="trader">
                    <label for="modeTrader">Trader</label>
                    <input type="radio" id="modeAnalyst" name="uiMode" value="analyst">
                    <label for="modeAnalyst">Analyst</label>
                </div>

                <button type="button" id="analyzeBtn">Analyze</button>
            </div>
        </div>
    </div>

    <div class="app-body">

        <!-- Workspace 1: Charts — the chart is the dominant component -->
        <section class="workspace workspace--charts" id="wsPanelCharts" role="tabpanel" aria-label="Charts workspace">
            <!-- Ticker Bar: TradingView ticker-tape widget is mounted here -->
            <div class="ticker-bar">
                <div class="tradingview-widget-container" id="tickerTape">
                    <div class="tradingview-widget-container__widget"></div>
                </div>
            </div>

            <div class="chart-panel">
                <div class="chart-host" id="chartHost"></div>
            </div>
        </section>

        <!-- Workspace 2: Keen Eye — the AI decision center -->
        <section class="workspace workspace--keeneye" id="wsPanelKeenEye" role="tabpanel" aria-label="Keen Eye workspace">
            <div class="analysis-scroll">
                <!-- Quantitative analysis output (rendered by qt-card.js) -->
                <div class="analysis-area">
                    <div id="analysisCard" class="qt-card-host" aria-live="polite">
                        <!-- Welcoming empty state; replaced by qt-card.js on first analysis. -->
                        <div class="qtw-empty">
                            <div class="qtw-empty-icon" aria-hidden="true">&#x1F50D;</div>
                            <strong>Keen Eye is ready</strong>
                            <p>Pick a symbol and timeframe above, then press Analyze. The full recommendation &mdash; trade setup, evidence, qualification gates and risk breakdown &mdash; appears here.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </div>
  </div>

    <!-- TradingView Library -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <!-- Quantitative analysis engine (load order matters: each builds on the last) -->
    <script src="engine/qt-config.js"></script>
    <script src="engine/qt-utils.js"></script>
    <script src="engine/qt-indicators.js"></script>
    <script src="engine/qt-detection.js"></script>
    <script src="engine/qt-candles.js"></script>
    <script src="engine/qt-structure.js"></script>
    <script src="engine/qt-chart-patterns.js"></script>
    <script src="engine/qt-patterns.js"></script>
    <script src="engine/qt-trend.js"></script>
    <script src="engine/qt-levels.js"></script>
    <script src="engine/qt-risk.js"></script>
    <script src="engine/qt-sentiment.js"></script>
    <script src="engine/qt-profiles.js"></script>
    <script src="engine/qt-scoring.js"></script>
    <script src="engine/qt-recommendation.js"></script>
    <script src="engine/qt-card.js"></script>
    <script src="engine/qt-app.js"></script>

    <script>
        'use strict';

        // ---------------------------------------------------------------
        // Configuration - single source of truth for ticker, selector, chart
        // ---------------------------------------------------------------
        const PAIRS = [
            // Coinbase BTCUSD is true Bitcoin / US Dollar spot (BINANCE:BTCUSDT quotes in Tether, not USD).
            { symbol: 'COINBASE:BTCUSD',  label: 'BTC / USD', base: 'BTC', quote: 'USD', category: 'crypto' },
            { symbol: 'OANDA:XAUUSD',    label: 'XAU / USD', base: 'XAU', quote: 'USD', category: 'metal' },
            { symbol: 'FX:EURUSD',       label: 'EUR / USD', base: 'EUR', quote: 'USD', category: 'forex' },
            { symbol: 'FX:GBPUSD',       label: 'GBP / USD', base: 'GBP', quote: 'USD', category: 'forex' },
            { symbol: 'FX:USDJPY',       label: 'USD / JPY', base: 'USD', quote: 'JPY', category: 'forex' },
            { symbol: 'FX:AUDUSD',       label: 'AUD / USD', base: 'AUD', quote: 'USD', category: 'forex' },
            { symbol: 'FX:GBPJPY',       label: 'GBP / JPY', base: 'GBP', quote: 'JPY', category: 'forex' },
            { symbol: 'FX:USDCAD',       label: 'USD / CAD', base: 'USD', quote: 'CAD', category: 'forex' },
            { symbol: 'FX:NZDUSD',       label: 'NZD / USD', base: 'NZD', quote: 'USD', category: 'forex' },
            { symbol: 'FX:USDCHF',       label: 'USD / CHF', base: 'USD', quote: 'CHF', category: 'forex' },
            { symbol: 'FX:EURAUD',       label: 'EUR / AUD', base: 'EUR', quote: 'AUD', category: 'forex' }
        ];

        // TradingView's public symbol-logo CDN
        const LOGO_BASE = 'https://s3-symbol-logo.tradingview.com';
        const COUNTRY_OF = {
            USD: 'US', EUR: 'EU', GBP: 'GB', JPY: 'JP',
            AUD: 'AU', CAD: 'CA', NZD: 'NZ', CHF: 'CH'
        };
        const ASSET_LOGO = {
            BTC: LOGO_BASE + '/crypto/XTVCBTC.svg',
            XAU: LOGO_BASE + '/metal/gold.svg'
        };

        function logoUrl(code) {
            if (ASSET_LOGO[code]) return ASSET_LOGO[code];
            if (COUNTRY_OF[code]) return LOGO_BASE + '/country/' + COUNTRY_OF[code] + '.svg';
            return null;
        }

        // Builds the base+quote logo pair; falls back to a text badge if an image fails.
        function buildLogo(pair) {
            const wrap = document.createElement('span');
            wrap.className = 'sym-logo';
            [pair.base, pair.quote].forEach((code) => {
                const url = logoUrl(code);
                if (!url) {
                    wrap.appendChild(fallbackBadge(code));
                    return;
                }
                // Not lazy-loaded: the dropdown panel starts display:none, so lazy
                // images there would only fetch on first open and visibly pop in.
                const img = document.createElement('img');
                img.src = url;
                img.alt = code;
                img.addEventListener('error', () => {
                    if (img.parentNode) img.parentNode.replaceChild(fallbackBadge(code), img);
                }, { once: true });
                wrap.appendChild(img);
            });
            return wrap;
        }

        function fallbackBadge(code) {
            const span = document.createElement('span');
            span.className = 'sym-fallback';
            span.title = code;
            span.textContent = code.slice(0, 3);
            return span;
        }


        // ---------------------------------------------------------------
        // Clock - Kuwait time (UTC+3, no DST), 12-hour, h:mm AM/PM (no seconds)
        // ---------------------------------------------------------------
        const clockEl = document.getElementById('clock');
        let kuwaitFormatter = null;
        try {
            kuwaitFormatter = new Intl.DateTimeFormat('en-US', {
                timeZone: 'Asia/Kuwait',
                hour: 'numeric', minute: '2-digit',
                hour12: true
            });
        } catch (err) {
            kuwaitFormatter = null;   // fall back to fixed-offset arithmetic below
        }

        function kuwaitTime() {
            const now = new Date();
            if (kuwaitFormatter) return kuwaitFormatter.format(now);
            // Kuwait observes no DST, so a fixed +03:00 shift is exact.
            const shifted = new Date(now.getTime() + 3 * 60 * 60 * 1000);
            let h = shifted.getUTCHours();
            const suffix = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            const pad = n => String(n).padStart(2, '0');
            return h + ':' + pad(shifted.getUTCMinutes()) + ' ' + suffix;
        }

        function updateClock() {
            clockEl.textContent = kuwaitTime();
        }

        // ---------------------------------------------------------------
        // Ticker tape widget - mounted into the top ticker bar
        // ---------------------------------------------------------------
        function mountTickerTape() {
            const container = document.querySelector('#tickerTape .tradingview-widget-container__widget');
            if (!container) return;
            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js';
            script.async = true;
            script.textContent = JSON.stringify({
                symbols: PAIRS.map(p => ({ proName: p.symbol, title: p.label.replace(/\s/g, '') })),
                showSymbolLogo: true,
                // Transparent mode falls back to a WHITE background in the tape's
                // narrow/stacked layout, so let the widget paint its own dark theme.
                isTransparent: false,
                displayMode: 'adaptive',
                colorTheme: 'dark',
                locale: 'en'
            });
            // The embed script renders into its own parent element.
            container.parentNode.appendChild(script);
        }

        // ---------------------------------------------------------------
        // Custom symbol selector
        // ---------------------------------------------------------------
        const selectEl  = document.getElementById('symbolSelect');
        const triggerEl = document.getElementById('symbolTrigger');
        const optionsEl = document.getElementById('symbolOptions');
        const triggerLogo   = document.getElementById('triggerLogo');
        const triggerTicker = document.getElementById('triggerTicker');

        let activeIndex = 0;   // currently selected pair
        let hoverIndex  = 0;   // keyboard-highlighted option

        function buildOptions() {
            optionsEl.innerHTML = '';
            PAIRS.forEach((pair, i) => {
                const opt = document.createElement('div');
                opt.className = 'symbol-option';
                opt.setAttribute('role', 'option');
                opt.dataset.index = String(i);
                opt.setAttribute('aria-selected', String(i === activeIndex));
                opt.id = 'symbol-option-' + i;

                opt.appendChild(buildLogo(pair));

                // Simplified: just the pair label. The symbol code and category
                // added no real value to selection and made the list busy.
                const ticker = document.createElement('span');
                ticker.className = 'opt-ticker';
                ticker.textContent = pair.label;
                opt.appendChild(ticker);

                opt.addEventListener('click', () => selectPair(i));
                opt.addEventListener('mousemove', () => setHover(i));
                optionsEl.appendChild(opt);
            });
        }

        function optionEls() {
            return Array.from(optionsEl.querySelectorAll('.symbol-option'));
        }

        // scrollIntoView is missing in some non-browser/older environments.
        function scrollOptionIntoView(el) {
            if (el && typeof el.scrollIntoView === 'function') {
                el.scrollIntoView({ block: 'nearest' });
            }
        }

        function setHover(i) {
            hoverIndex = i;
            optionEls().forEach((el) => {
                el.classList.toggle('active', Number(el.dataset.index) === i);
            });
        }

        function renderTrigger() {
            const pair = PAIRS[activeIndex];
            triggerLogo.innerHTML = '';
            triggerLogo.appendChild(buildLogo(pair));
            triggerTicker.textContent = pair.label;
            triggerEl.title = pair.label + '  (' + pair.symbol + ')';
        }

        function openPanel() {
            selectEl.classList.add('open');
            triggerEl.setAttribute('aria-expanded', 'true');
            setHover(activeIndex);
            scrollOptionIntoView(optionEls()[activeIndex]);
            // Focus stays on the trigger; arrow/enter keydown bubbles to selectEl.
        }

        function closePanel(refocus) {
            selectEl.classList.remove('open');
            triggerEl.setAttribute('aria-expanded', 'false');
            if (refocus) triggerEl.focus();
        }

        function selectPair(i) {
            const changed = i !== activeIndex;
            activeIndex = i;
            optionEls().forEach((el) => {
                el.setAttribute('aria-selected', String(Number(el.dataset.index) === i));
            });
            renderTrigger();
            closePanel(true);
            if (changed) renderChart();
            savePref('qt.symbol', PAIRS[activeIndex].symbol);
        }

        triggerEl.addEventListener('click', () => {
            if (selectEl.classList.contains('open')) {
                closePanel(false);
            } else {
                openPanel();
            }
        });

        selectEl.addEventListener('keydown', (e) => {
            const open = selectEl.classList.contains('open');
            if (!open) {
                if (e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    openPanel();
                }
                return;
            }

            if (e.key === 'Escape') {
                e.preventDefault();
                closePanel(true);
                return;
            }

            const vis = optionEls();
            if (!vis.length) return;
            const pos = vis.findIndex(el => Number(el.dataset.index) === hoverIndex);

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                const next = vis[Math.min(pos + 1, vis.length - 1)] || vis[0];
                setHover(Number(next.dataset.index));
                scrollOptionIntoView(next);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                const prev = vis[Math.max(pos - 1, 0)] || vis[0];
                setHover(Number(prev.dataset.index));
                scrollOptionIntoView(prev);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (pos !== -1) selectPair(hoverIndex);
            }
        });

        document.addEventListener('click', (e) => {
            if (!selectEl.contains(e.target)) closePanel(false);
        });

        // ---------------------------------------------------------------
        // Active chart
        // ---------------------------------------------------------------
        const chartHost = document.getElementById('chartHost');
        let widgetSeq = 0;

        function showChartMessage(text, isError) {
            chartHost.innerHTML = '';
            const msg = document.createElement('div');
            msg.className = 'chart-message' + (isError ? ' error' : '');
            msg.textContent = text;
            chartHost.appendChild(msg);
        }

        function renderChart() {
            const pair = PAIRS[activeIndex];

            if (typeof TradingView === 'undefined' || typeof TradingView.widget !== 'function') {
                showChartMessage('TradingView library failed to load. Check your network connection and reload.', true);
                return;
            }

            // Tear down the previous widget and mount into a fresh container id,
            // otherwise TradingView can keep the stale iframe around.
            chartHost.innerHTML = '';
            const containerId = 'tv_chart_' + (++widgetSeq);
            const host = document.createElement('div');
            host.id = containerId;
            host.style.width = '100%';
            host.style.height = '100%';
            chartHost.appendChild(host);

            try {
                new TradingView.widget({
                    container_id: containerId,
                    symbol: pair.symbol,
                    interval: document.getElementById('intervalSelect').value,
                    style: parseInt(document.getElementById('styleSelect').value, 10),
                    timezone: 'Etc/UTC',
                    theme: 'dark',
                    locale: 'en',
                    toolbar_bg: '#1a1a2e',
                    enable_publishing: false,
                    hide_top_toolbar: false,
                    hide_legend: false,
                    hide_side_toolbar: false,
                    allow_symbol_change: false,
                    save_image: false,
                    withdateranges: true,
                    details: false,
                    hotlist: false,
                    calendar: false,
                    studies: ['MASimple@tv-basicstudies'],
                    autosize: true,
                    backgroundColor: '#1a1a2e',
                    gridColor: '#1e1e35'
                    // NOTE: the free TradingView embed ignores `overrides`,
                    // `enabled_features` and `favorites` entirely (verified by A/B
                    // test at both file:// and http origins), so no chart-settings
                    // options are passed here - they would be dead config.
                });
            } catch (err) {
                console.error('TradingView widget failed:', err);
                showChartMessage('Unable to render the chart for ' + pair.label + '.', true);
            }
        }

        document.getElementById('intervalSelect').addEventListener('change', renderChart);
        document.getElementById('styleSelect').addEventListener('change', renderChart);
        document.getElementById('reloadBtn').addEventListener('click', renderChart);

        // ---------------------------------------------------------------
        // Two-workspace switching (Charts / Keen Eye) — presentation only.
        // A pure attribute flip, persisted to localStorage. Both panels stay
        // mounted, so switching never reloads the chart or re-runs the engine.
        // A single icon button toggles between the two: the icon shown is the
        // CURRENT workspace's icon, and the label always names the destination.
        // ---------------------------------------------------------------
        var appEl = document.getElementById('app');
        var WS_KEY = 'qt.workspace';
        var wsToggle = document.getElementById('wsToggle');
        var wsToggleIcon = document.getElementById('wsToggleIcon');
        var WS_ICON = { charts: '\u{1F4C8}', keeneye: '\u{1F441}️' };   // 📈 chart / 👁️ eye

        function setWorkspace(ws) {
            ws = ws === 'keeneye' ? 'keeneye' : 'charts';
            appEl.setAttribute('data-workspace', ws);
            if (wsToggle) {
                var next = ws === 'charts' ? 'keeneye' : 'charts';
                var nextLabel = next === 'charts' ? 'Charts' : 'Keen Eye';
                wsToggle.setAttribute('aria-pressed', String(ws === 'keeneye'));
                wsToggle.setAttribute('aria-label', 'Switch to ' + nextLabel);
                wsToggle.title = 'Switch to ' + nextLabel;
                if (wsToggleIcon) wsToggleIcon.textContent = WS_ICON[ws];
            }
            try { localStorage.setItem(WS_KEY, ws); } catch (e) { /* storage may be unavailable */ }
            // TradingView autosizes on resize; nudge it when the chart reappears.
            if (ws === 'charts') {
                requestAnimationFrame(function () { window.dispatchEvent(new Event('resize')); });
            }
        }

        function wireWorkspaceSwitch() {
            if (!wsToggle) return;
            wsToggle.addEventListener('click', function () {
                setWorkspace(appEl.getAttribute('data-workspace') === 'charts' ? 'keeneye' : 'charts');
            });
        }

        // ---- Save-profile toggle: persists its own ON/OFF state; icon is full
        // brightness when ON, dimmed when OFF (see #saveProfileBtn CSS). ----
        var SAVE_PROFILE_KEY = 'qt.profileSaveEnabled';
        var saveProfileBtn = document.getElementById('saveProfileBtn');
        function setSaveProfile(on) {
            if (!saveProfileBtn) return;
            saveProfileBtn.setAttribute('aria-pressed', String(on));
            saveProfileBtn.title = on ? 'Profile preferences: saving' : 'Profile preferences: not saving';
            saveProfileBtn.setAttribute('aria-label', saveProfileBtn.title);
            try { localStorage.setItem(SAVE_PROFILE_KEY, on ? '1' : '0'); } catch (e) { /* storage may be unavailable */ }
        }
        function wireSaveProfile() {
            if (!saveProfileBtn) return;
            var stored = '0';
            try { stored = localStorage.getItem(SAVE_PROFILE_KEY) || '0'; } catch (e) { /* storage may be unavailable */ }
            setSaveProfile(stored === '1');
            saveProfileBtn.addEventListener('click', function () {
                setSaveProfile(saveProfileBtn.getAttribute('aria-pressed') !== 'true');
            });
        }

        // ---- Connection indicator in the header (real observed state only) ----
        // Pulse dot only; the state text is exposed via the chip's title/aria-label.
        var connDot = document.getElementById('connDot');
        var connChip = document.getElementById('connChip');
        function setConn(state, message) {
            if (connDot) {
                connDot.classList.remove('is-loading', 'is-ok', 'is-error');
                if (state === 'loading') connDot.classList.add('is-loading');
                else if (state === 'ok') connDot.classList.add('is-ok');
                else if (state === 'error') connDot.classList.add('is-error');
            }
            if (connChip) {
                var label = state === 'loading' ? 'Connecting…'
                    : state === 'ok' ? 'Connected'
                    : state === 'error' ? 'Unreachable' : 'Idle';
                var full = 'Analysis proxy connection: ' + label + (message ? ' — ' + message : '');
                connChip.title = full;
                connChip.setAttribute('aria-label', full);
            }
        }

        // ---------------------------------------------------------------
        // Session persistence — reopen exactly as the user left it. Symbol,
        // interval, profile and chart style join the already-persisted
        // workspace and Trader/Analyst mode. Presentation state only.
        // ---------------------------------------------------------------
        var PREF = { symbol: 'qt.symbol', interval: 'qt.interval', profile: 'qt.profile', style: 'qt.style' };
        function savePref(k, v) { try { localStorage.setItem(k, v); } catch (e) { /* storage may be unavailable */ } }
        function loadPref(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
        function setSelectValue(id, val) {
            var sel = document.getElementById(id);
            if (!sel || val == null) return;
            var ok = Array.prototype.some.call(sel.options, function (o) { return o.value === val; });
            if (ok) sel.value = val;
        }
        function restorePrefs() {
            var sym = loadPref(PREF.symbol);
            if (sym) {
                for (var i = 0; i < PAIRS.length; i++) {
                    if (PAIRS[i].symbol === sym) { activeIndex = i; break; }
                }
            }
            setSelectValue('intervalSelect', loadPref(PREF.interval));
            setSelectValue('styleSelect', loadPref(PREF.style));
            setSelectValue('profileSelect', loadPref(PREF.profile));
        }
        function wirePrefPersistence() {
            var iv = document.getElementById('intervalSelect');
            var st = document.getElementById('styleSelect');
            var pf = document.getElementById('profileSelect');
            if (iv) iv.addEventListener('change', function () { savePref(PREF.interval, iv.value); });
            if (st) st.addEventListener('change', function () { savePref(PREF.style, st.value); });
            if (pf) pf.addEventListener('change', function () { savePref(PREF.profile, pf.value); });
        }

        // ---------------------------------------------------------------
        // Init
        // ---------------------------------------------------------------
        restorePrefs();
        buildOptions();
        renderTrigger();
        updateClock();
        setInterval(updateClock, 1000);
        mountTickerTape();
        wireWorkspaceSwitch();
        wireSaveProfile();
        wirePrefPersistence();
        setConn('idle');

        // ---------------------------------------------------------------
        // Trader / Analyst mode toggle — pure display switch (Phase 8.5).
        // QT.card owns the mode state (and its localStorage persistence);
        // this just reflects it into the radio pair and forwards changes.
        // Switching modes never re-fetches, re-analyzes, or re-renders.
        // ---------------------------------------------------------------
        var modeRadios = document.querySelectorAll('input[name="uiMode"]');
        var initialMode = QT.card.getMode();
        modeRadios.forEach(function (r) {
            r.checked = (r.value === initialMode);
            r.addEventListener('change', function () {
                if (this.checked) QT.card.setMode(this.value);
            });
        });

        // ---------------------------------------------------------------
        // Analyze: delegates entirely to the engine; no analysis lives here.
        // ---------------------------------------------------------------
        var analyzeBtn = document.getElementById('analyzeBtn');
        var analysisCard = document.getElementById('analysisCard');
        var profileSelect = document.getElementById('profileSelect');

        analyzeBtn.addEventListener('click', function () {
            // Results render in Keen Eye — surface it immediately so the user
            // sees the loading state and then the recommendation as it lands.
            setWorkspace('keeneye');
            setConn('loading', 'Analyzing ' + PAIRS[activeIndex].label + '…');
            QT.app.run({
                symbol: PAIRS[activeIndex].symbol,
                timeframe: document.getElementById('intervalSelect').value,
                profile: profileSelect.value,
                container: analysisCard,
                button: analyzeBtn
            }).then(function (rec) {
                if (rec && rec.recommendation) {
                    setConn('ok', 'Analysis ready — ' + rec.recommendation.label + '.');
                } else {
                    setConn('error', 'Analysis failed. See the panel for details.');
                }
            });
        });

        window.addEventListener('load', () => {
            renderChart();
            // Restore the last workspace only after the chart mounts while Charts
            // is visible, so TradingView sizes correctly on first paint.
            var startWs = 'charts';
            try { startWs = localStorage.getItem(WS_KEY) || 'charts'; } catch (e) { /* storage may be unavailable */ }
            setWorkspace(startWs);
        });
    </script>

</body>
</html>
